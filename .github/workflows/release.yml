name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  package:
    name: Package ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

      - name: Package
        run: bun run package:release ${{ matrix.target }}
        working-directory: cli

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: switchboard-${{ matrix.target }}
          path: cli/dist/release/switchboard-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    name: Publish
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: switchboard-*
          path: cli/dist/release
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install release tooling
        run: npm install --no-save semantic-release @semantic-release/github

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
