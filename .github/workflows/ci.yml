name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: cli

      - name: Typecheck
        run: bun run typecheck
        working-directory: cli

      - name: Build
        run: bun run build
        working-directory: cli
